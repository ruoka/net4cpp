name: "setup-llvm"
description: "Install LLVM 21 + related tools via apt, caching .deb archives in a user-owned directory."
inputs:
  packages:
    description: "Space-separated apt packages to install (default includes libc++, clang, lld, lldb, jq)"
    required: false
    default: "libc++-21-dev libc++abi-21-dev clang-21 lld-21 lldb-21 jq libssl-dev clang-tools-21"

runs:
  using: "composite"
  steps:
    # Apt must remain the source of truth for /usr. We only cache downloaded
    # .debs in a user-owned directory so actions/cache can restore them (the
    # runner user cannot extract into root-owned /var/cache/apt/archives).
    - name: Prepare LLVM apt source and cache fingerprint
      id: prep
      shell: bash
      env:
        LLVM_PACKAGES: ${{ inputs.packages }}
      run: |
        set -euo pipefail

        APT_CACHE="${HOME}/.cache/ruoka-apt-llvm"
        mkdir -p "${APT_CACHE}/partial"
        echo "cache_dir=${APT_CACHE}" >> "${GITHUB_OUTPUT}"

        # Hosted runners wipe kept packages via docker-clean; keep .debs so the
        # archive cache is non-empty after install.
        sudo rm -f /etc/apt/apt.conf.d/docker-clean
        echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' \
          | sudo tee /etc/apt/apt.conf.d/01keep-debs >/dev/null

        sudo apt-get update -y
        sudo apt-get install -y wget gnupg ca-certificates lsb-release software-properties-common

        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key \
          | sudo gpg --dearmor -o /usr/share/keyrings/apt-llvm.gpg
        echo "deb [signed-by=/usr/share/keyrings/apt-llvm.gpg] https://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main" \
          | sudo tee /etc/apt/sources.list.d/apt-llvm.org.list >/dev/null
        sudo apt-get update -y

        # Fingerprint candidate versions so a LLVM apt bump invalidates the cache.
        fingerprint="$(
          {
            printf 'packages:%s\n' "${LLVM_PACKAGES}"
            # shellcheck disable=SC2086
            for pkg in ${LLVM_PACKAGES}; do
              apt-cache policy "${pkg}" 2>/dev/null \
                | awk -v p="${pkg}" '/Candidate:/ { print p ":" $2; exit }'
            done
          } | sha256sum | awk '{ print $1 }'
        )"
        echo "fingerprint=${fingerprint}" >> "${GITHUB_OUTPUT}"
        echo "Apt fingerprint: ${fingerprint}"

    - name: Cache apt .deb archives
      uses: actions/cache@v4
      with:
        path: ${{ steps.prep.outputs.cache_dir }}
        key: apt-llvm-21-${{ runner.os }}-${{ runner.arch }}-${{ steps.prep.outputs.fingerprint }}
        restore-keys: |
          apt-llvm-21-${{ runner.os }}-${{ runner.arch }}-

    - name: Install LLVM packages from apt
      shell: bash
      env:
        LLVM_PACKAGES: ${{ inputs.packages }}
        APT_CACHE: ${{ steps.prep.outputs.cache_dir }}
      run: |
        set -euo pipefail

        mkdir -p "${APT_CACHE}/partial"

        # shellcheck disable=SC2086
        sudo apt-get \
          -o Dir::Cache::archives="${APT_CACHE}" \
          install -y ${LLVM_PACKAGES}

        # actions/cache packs as the runner user; apt may have written as root.
        sudo chown -R "$(id -u):$(id -g)" "${APT_CACHE}"

        if [[ -x /usr/bin/clang-21 ]]; then
          sudo update-alternatives --install /usr/bin/clang   clang   /usr/bin/clang-21   100 || true
        fi
        if [[ -x /usr/bin/clang++-21 ]]; then
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-21 100 || true
        fi
        if [[ -x /usr/bin/lld-21 ]]; then
          sudo update-alternatives --install /usr/bin/lld     lld     /usr/bin/lld-21     100 || true
        fi

        clang++-21 --version | head -1
        echo "Apt archive cache: $(du -sh "${APT_CACHE}" | awk '{print $1}') ($(find "${APT_CACHE}" -name '*.deb' | wc -l | tr -d ' ') .deb files)"
        echo "LLVM setup complete."
